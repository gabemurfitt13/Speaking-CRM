<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Speaker CRM</title>
  <style>
    body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#eef1f5;color:#172033}*{box-sizing:border-box}.app{min-height:100vh;display:grid;grid-template-columns:230px 1fr}.side{background:#151922;color:white;padding:18px}.side h1{font-size:20px;margin:0 0 4px}.side p{font-size:13px;color:#b8bfcc;margin:0 0 18px}.nav button,.add-btn{width:100%;border:0;border-radius:12px;background:transparent;color:#e5e7eb;padding:11px 12px;text-align:left;cursor:pointer;margin-bottom:7px;font-size:14px}.nav button.active,.nav button:hover,.add-btn:hover{background:#2b3240}.main{min-width:0}.top{min-height:66px;background:white;border-bottom:1px solid #d9dee8;display:flex;align-items:center;gap:10px;padding:12px 16px;flex-wrap:wrap}.top input,.top select{height:38px;border:1px solid #d9dee8;border-radius:11px;padding:0 11px;background:white}.top input{flex:1;min-width:220px}.content{padding:16px}.grid{display:grid;grid-template-columns:minmax(280px,420px) 1fr;gap:16px}.cards{display:flex;flex-direction:column;gap:10px}.card,.panel,.stat{background:white;border:1px solid #d9dee8;border-radius:16px;box-shadow:0 1px 2px rgba(0,0,0,.04)}.card{padding:13px;cursor:pointer}.card:hover,.card.selected{border-color:#8ba6cc;box-shadow:0 3px 10px rgba(0,0,0,.08)}.card-top{display:flex;align-items:start;justify-content:space-between;gap:8px}.card h3{font-size:15px;margin:0}.meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}.badge,.pill{display:inline-flex;border:1px solid #d9dee8;border-radius:999px;padding:3px 8px;font-size:11px}.pill{font-weight:700}.contact{font-size:12px;color:#536072;margin-top:8px}.panel{padding:16px}.panel h2{margin:0 0 4px;font-size:21px}.row{display:grid;grid-template-columns:120px 1fr;gap:8px;font-size:13px;margin:8px 0}.label{color:#6b7280}.section{border-top:1px solid #e5e7eb;margin-top:14px;padding-top:14px}.section h4{font-size:12px;text-transform:uppercase;color:#6b7280;letter-spacing:.05em;margin:0 0 8px}.panel input,.panel select,.panel textarea,.modal input,.modal select,.modal textarea{width:100%;border:1px solid #d9dee8;border-radius:11px;padding:9px;font-family:inherit}.panel textarea,.modal textarea{min-height:90px;resize:vertical}.btn{height:36px;border:1px solid #d9dee8;border-radius:11px;background:white;padding:0 13px;cursor:pointer}.btn.primary{background:#1f2937;color:white;border-color:#1f2937}.actions{display:flex;gap:8px;justify-content:flex-end;margin-top:10px}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}.stat{padding:15px}.stat .n{font-size:30px;font-weight:800}.stat .l{font-size:12px;color:#6b7280}.empty{padding:30px;text-align:center;color:#6b7280}.log{border-top:1px solid #eef1f5;margin-top:8px;padding-top:8px}.log small{color:#6b7280}.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-start;justify-content:center;padding-top:28px}.modal{width:min(760px,calc(100vw - 32px));max-height:calc(100vh - 56px);overflow:auto;background:white;border-radius:18px;padding:18px}.form{display:grid;grid-template-columns:1fr 1fr;gap:10px}.form label{display:block;font-size:12px;color:#6b7280;margin-bottom:4px}.full{grid-column:1/-1}@media(max-width:900px){.app{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<div id="root"></div>
<script>
const STATUSES=['Not Started','Left Voicemail','Emailed','In Discussion','Booked!','Not Interested','Try Next Year'];
const COLORS={'Not Started':['#f6f7f9','#555','#ddd'],'Left Voicemail':['#FAEEDA','#633806','#FAC775'],'Emailed':['#E6F1FB','#042C53','#85B7EB'],'In Discussion':['#EEEDFE','#26215C','#AFA9EC'],'Booked!':['#EAF3DE','#173404','#97C459'],'Not Interested':['#FCEBEB','#501313','#F09595'],'Try Next Year':['#FAECE7','#4A1B0C','#F0997B']};
const KEY='gabe-speaker-crm-v1';
let state={contacts:[],view:'contacts',selected:null,search:'',status:'All',type:'All',showAdd:false};
const $=s=>document.querySelector(s);
function esc(v){return String(v??'').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m]||m))}
function load(){try{state.contacts=JSON.parse(localStorage.getItem(KEY))||[]}catch{state.contacts=[]}}
function save(){localStorage.setItem(KEY,JSON.stringify(state.contacts));draw()}
function today(){return new Date().toISOString().slice(0,10)}
function pill(status){const c=COLORS[status]||COLORS['Not Started'];return `<span class="pill" style="background:${c[0]};color:${c[1]};border-color:${c[2]}">${esc(status)}</span>`}
function due(){const t=today();return state.contacts.filter(c=>c.followUp&&c.followUp<=t&&!['Booked!','Not Interested'].includes(c.status)).sort((a,b)=>a.followUp.localeCompare(b.followUp))}
function filtered(){const q=state.search.toLowerCase();return state.contacts.filter(c=>(!q||[c.school,c.contact,c.city,c.district].join(' ').toLowerCase().includes(q))&&(state.status==='All'||c.status===state.status)&&(state.type==='All'||c.type===state.type)).sort((a,b)=>(a.priority||9)-(b.priority||9)||a.school.localeCompare(b.school))}
function stats(){return {total:state.contacts.length,contacted:state.contacts.filter(c=>c.status!=='Not Started').length,booked:state.contacts.filter(c=>c.status==='Booked!').length,followups:due().length}}
function draw(){const s=stats();document.getElementById('root').innerHTML=`<div class="app"><aside class="side"><h1>Gabe Murfitt</h1><p>Speaker CRM</p><div class="nav"><button class="${state.view==='dashboard'?'active':''}" onclick="setView('dashboard')">Dashboard</button><button class="${state.view==='contacts'?'active':''}" onclick="setView('contacts')">All Schools</button><button class="${state.view==='followups'?'active':''}" onclick="setView('followups')">Follow-ups ${s.followups?`(${s.followups})`:''}</button></div><button class="add-btn" onclick="openAdd()">+ Add School</button></aside><main class="main">${topbar()}<div class="content">${state.view==='dashboard'?dashboard():state.view==='followups'?contactList(due()):contactList(filtered())}</div></main></div>${state.showAdd?modal():''}`}
function topbar(){if(state.view==='dashboard')return `<div class="top"><h2>Dashboard</h2></div>`;if(state.view==='followups')return `<div class="top"><h2>Follow-ups</h2><span>${due().length} due</span></div>`;return `<div class="top"><input placeholder="Search schools, contacts, cities..." value="${esc(state.search)}" oninput="state.search=this.value;draw()"><select onchange="state.status=this.value;draw()"><option>All</option>${STATUSES.map(x=>`<option ${state.status===x?'selected':''}>${x}</option>`).join('')}</select><select onchange="state.type=this.value;draw()"><option>All</option>${['High School','Middle/Jr High','Elementary'].map(x=>`<option ${state.type===x?'selected':''}>${x}</option>`).join('')}</select></div>`}
function dashboard(){const s=stats();return `<div style="width:100%"><div class="stats">${[['Total Schools',s.total],['Reached Out',s.contacted],['Booked!',s.booked],['Follow-ups Due',s.followups]].map(x=>`<div class="stat"><div class="l">${x[0]}</div><div class="n">${x[1]}</div></div>`).join('')}</div><div class="panel"><h2>Status Breakdown</h2>${STATUSES.map(st=>`<p>${pill(st)} <strong>${state.contacts.filter(c=>c.status===st).length}</strong></p>`).join('')}</div></div>`}
function contactList(list){return `<div class="grid"><div class="cards">${list.length?list.map(card).join(''):`<div class="empty">No schools yet. Hit Add School and start building the list, because apparently outreach does not perform itself.</div>`}</div>${state.selected?detail(state.contacts.find(c=>c.id===state.selected)):''}</div>`}
function card(c){let overdue=c.followUp&&c.followUp<=today()&&!['Booked!','Not Interested'].includes(c.status);return `<div class="card ${state.selected===c.id?'selected':''}" onclick="state.selected='${c.id}';draw()"><div class="card-top"><h3>${esc(c.school)}</h3>${pill(c.status)}</div><div class="meta"><span class="badge">${esc(c.type)}</span><span class="badge">${esc(c.city)}</span><span class="badge">Priority ${esc(c.priority)}</span>${overdue?'<span class="badge" style="background:#fff1f1;color:#8a1212;border-color:#f0a0a0">Follow-up due</span>':''}</div>${c.contact?`<div class="contact"><strong>${esc(c.contact)}</strong> · ${esc(c.role)}</div>`:''}</div>`}
function detail(c){if(!c)return'';return `<div class="panel"><h2>${esc(c.school)}</h2><p>${esc(c.type)} · ${esc(c.cls)} · ${esc(c.district)}</p><div class="section"><h4>Primary Contact</h4>${row('Name',esc(c.contact))}${row('Role',esc(c.role))}${row('Phone',esc(c.phone))}${row('Email',c.email?`<a href="mailto:${esc(c.email)}">${esc(c.email)}</a>`:'')}</div><div class="section"><h4>Status</h4><select id="status">${STATUSES.map(st=>`<option ${c.status===st?'selected':''}>${st}</option>`).join('')}</select><h4 style="margin-top:10px">Date Contacted</h4><input id="contacted" type="date" value="${esc(c.contacted)}"><h4 style="margin-top:10px">Follow-up Date</h4><input id="followUp" type="date" value="${esc(c.followUp)}"><h4 style="margin-top:10px">Notes</h4><textarea id="notes">${esc(c.notes)}</textarea><div class="actions"><button class="btn" onclick="deleteContact('${c.id}')">Delete</button><button class="btn primary" onclick="saveContact('${c.id}')">Save Changes</button></div></div><div class="section"><h4>Log Activity</h4><div style="display:flex;gap:8px"><select id="logType"><option>Call</option><option>Email</option><option>Meeting</option><option>Note</option></select><input id="logNote" placeholder="What happened?"><button class="btn" onclick="addLog('${c.id}')">Add</button></div>${(c.log||[]).map(l=>`<div class="log"><small>${esc(l.date)} · ${esc(l.type)}</small><div>${esc(l.note)}</div></div>`).join('')}</div></div>`}
function row(a,b){return `<div class="row"><div class="label">${a}</div><div>${b||''}</div></div>`}
function modal(){return `<div class="modal-back"><div class="modal"><h2>Add School</h2><div class="form"><div class="full"><label>School Name</label><input id="mSchool"></div><div><label>Type</label><select id="mType"><option>High School</option><option>Middle/Jr High</option><option>Elementary</option></select></div><div><label>Class/Grade</label><input id="mCls" value="6A"></div><div><label>District</label><input id="mDistrict"></div><div><label>City</label><input id="mCity"></div><div><label>Priority</label><select id="mPriority"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div><div><label>Primary Contact</label><input id="mContact"></div><div><label>Role</label><input id="mRole" value="Activities Director"></div><div><label>Phone</label><input id="mPhone"></div><div><label>Email</label><input id="mEmail"></div><div class="full"><label>Notes</label><textarea id="mNotes"></textarea></div></div><div class="actions"><button class="btn" onclick="closeAdd()">Cancel</button><button class="btn primary" onclick="saveNew()">Add School</button></div></div></div>`}
function setView(v){state.view=v;state.selected=null;draw()}function openAdd(){state.showAdd=true;draw()}function closeAdd(){state.showAdd=false;draw()}
function saveContact(id){const c=state.contacts.find(x=>x.id===id);c.status=$('#status').value;c.contacted=$('#contacted').value;c.followUp=$('#followUp').value;c.notes=$('#notes').value;save()}
function addLog(id){const note=$('#logNote').value.trim();if(!note)return;const c=state.contacts.find(x=>x.id===id);c.log=[{date:today(),type:$('#logType').value,note},...(c.log||[])];save()}
function deleteContact(id){if(!confirm('Delete this school?'))return;state.contacts=state.contacts.filter(c=>c.id!==id);state.selected=null;save()}
function saveNew(){const school=$('#mSchool').value.trim();if(!school)return alert('School name is required.');state.contacts.push({id:'c-'+Date.now(),school,type:$('#mType').value,cls:$('#mCls').value,district:$('#mDistrict').value,city:$('#mCity').value,priority:+$('#mPriority').value,contact:$('#mContact').value,role:$('#mRole').value,phone:$('#mPhone').value,email:$('#mEmail').value,status:'Not Started',notes:$('#mNotes').value,followUp:'',contacted:'',log:[]});state.showAdd=false;save()}
load();draw();
</script>
</body>
</html>
